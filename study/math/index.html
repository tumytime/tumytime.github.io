<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数学笔记 | Tumy Study</title>
  <meta name="description" content="Tumy Study 的数学学习笔记，收纳公式、曲面、极限和推导。">
  <link rel="stylesheet" href="/study/assets/study.css">
</head>
<body data-page="course" data-subject="math">
  <canvas class="study-canvas" aria-hidden="true"></canvas>
  <main class="study-shell">
    <nav class="study-nav" aria-label="学习小站导航">
      <a class="study-brand" href="/study/">
        <span class="study-brand__mark">S</span>
        <span>Tumy Study</span>
      </a>
      <div class="study-nav__links">
        <a class="study-pill" href="/study/">学习主页</a>
        <a class="study-pill" href="/study/control/">自动控制原理</a>
        <a class="study-pill" href="/">返回主站</a>
      </div>
    </nav>

    <section class="course-hero" aria-labelledby="course-title">
      <div class="course-hero__main">
        <p class="eyebrow">Mathematics notes</p>
        <h1 id="course-title">数学</h1>
        <p>
          从一条公式到一张曲面，从一个极限到一段证明。这里先收纳我正在深入学习的数学内容，尤其适合放可交互 3D 模型和推导笔记。
        </p>
      </div>
      <aside class="course-hero__aside">
        <div class="metric">
          <strong data-course-count>0</strong>
          <span>数学笔记</span>
        </div>
        <div class="metric">
          <strong data-course-latest>加载中</strong>
          <span>最近更新</span>
        </div>
      </aside>
    </section>

    <section class="note-grid" data-notes-grid aria-label="数学笔记列表">
      <div class="empty-state">正在加载数学笔记。</div>
    </section>
  </main>

  <script src="/study/assets/study.js"></script>
</body>
</html>
