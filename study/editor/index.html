<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记撰写工具 | Tumy Study</title>
  <meta name="description" content="Tumy Study 的隐藏笔记撰写工具，可写 Markdown、预览 LaTeX 并生成交互式 3D 曲面。">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="/study/assets/study.css">
</head>
<body class="study-editor" data-page="editor">
  <canvas class="study-canvas" aria-hidden="true"></canvas>
  <main class="study-shell">
    <nav class="study-nav" aria-label="编辑器导航">
      <a class="study-brand" href="/study/">
        <span class="study-brand__mark">S</span>
        <span>Tumy Study Editor</span>
      </a>
      <div class="study-nav__links">
        <a class="study-pill" href="/study/">学习主页</a>
        <a class="study-pill" href="/study/math/">数学</a>
        <a class="study-pill" href="/study/control/">自动控制原理</a>
      </div>
    </nav>

    <section class="editor-layout" aria-label="笔记撰写工具">
      <div class="editor-card">
        <h1>写一篇新笔记</h1>
        <p>
          用 Markdown 写正文，公式用 <code>$...$</code> 或 <code>$$...$$</code>。3D 曲面可以拖进正文，也可以点击插入。
        </p>

        <div class="field">
          <label for="note-title">标题</label>
          <input id="note-title" type="text" autocomplete="off">
        </div>

        <div class="field">
          <label for="note-subject">学科</label>
          <select id="note-subject">
            <option value="math">数学</option>
            <option value="control">自动控制原理</option>
          </select>
        </div>

        <div class="field">
          <label for="note-slug">URL Slug</label>
          <input id="note-slug" type="text" autocomplete="off" placeholder="limit-surface">
        </div>

        <div class="field">
          <label for="note-date">日期</label>
          <input id="note-date" type="date">
        </div>

        <div class="field">
          <label for="note-summary">摘要</label>
          <textarea id="note-summary" style="min-height: 96px"></textarea>
        </div>

        <div class="field">
          <label for="cover-seed">自动封面种子</label>
          <input id="cover-seed" type="text" autocomplete="off" placeholder="limit-surface">
        </div>

        <div class="editor-card" style="box-shadow:none;margin:18px 0;background:rgba(255,255,255,0.46)">
          <h2>交互式 3D 模型</h2>
          <div class="field">
            <label for="surface-expression">函数 z = f(x, y)</label>
            <input id="surface-expression" type="text" value="sin(x)*cos(y)" autocomplete="off">
          </div>
          <div class="field">
            <label for="surface-range">范围 min,max</label>
            <input id="surface-range" type="text" value="-6,6" autocomplete="off">
          </div>
          <div class="field">
            <label for="surface-title">模型标题</label>
            <input id="surface-title" type="text" value="振荡曲面" autocomplete="off">
          </div>
          <div id="model-chip" class="model-chip" draggable="true" title="拖到 Markdown 正文里">
            <strong>可拖拽模型块</strong>
            <code></code>
          </div>
          <div class="editor-actions">
            <button class="study-button" id="insert-model" type="button">插入模型块</button>
          </div>
          <div id="model-preview" class="surface-preview"></div>
        </div>

        <div class="field">
          <label for="note-markdown">Markdown 正文</label>
          <textarea id="note-markdown" spellcheck="false"></textarea>
        </div>

        <div class="editor-actions">
          <button class="study-button" id="refresh-preview" type="button">刷新预览</button>
          <button class="study-button control" id="export-html" type="button">导出 HTML</button>
          <button class="study-button secondary" id="copy-metadata" type="button">复制元数据</button>
        </div>

        <p class="status-line" id="editor-status"></p>

        <div class="field">
          <label for="metadata-output">notes.json 元数据片段</label>
          <textarea class="metadata-box" id="metadata-output" readonly></textarea>
        </div>
      </div>

      <div class="preview-frame" id="editor-preview" aria-label="笔记预览"></div>
    </section>
  </main>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/study/assets/study.js"></script>
</body>
</html>
