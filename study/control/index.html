<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动控制原理笔记 | Tumy Study</title>
  <meta name="description" content="Tumy Study 的自动控制原理学习笔记，收纳反馈、稳定性、传递函数和系统响应。">
  <link rel="stylesheet" href="/study/assets/study.css">
</head>
<body data-page="course" data-subject="control">
  <canvas class="study-canvas" aria-hidden="true"></canvas>
  <main class="study-shell">
    <nav class="study-nav" aria-label="学习小站导航">
      <a class="study-brand" href="/study/">
        <span class="study-brand__mark">S</span>
        <span>Tumy Study</span>
      </a>
      <div class="study-nav__links">
        <a class="study-pill" href="/study/">学习主页</a>
        <a class="study-pill" href="/study/math/">数学</a>
        <a class="study-pill" href="/">返回主站</a>
      </div>
    </nav>

    <section class="course-hero" aria-labelledby="course-title">
      <div class="course-hero__main" style="--accent: var(--control)">
        <p class="eyebrow" style="color: var(--control)">Automatic control notes</p>
        <h1 id="course-title">自动控制原理</h1>
        <p>
          这里记录传递函数、方框图、反馈、稳定性和动态响应。第一版先做笔记展示，后续可以继续加 Bode、Nyquist 和阶跃响应工具。
        </p>
      </div>
      <aside class="course-hero__aside">
        <div class="metric">
          <strong data-course-count>0</strong>
          <span>自控笔记</span>
        </div>
        <div class="metric">
          <strong data-course-latest>加载中</strong>
          <span>最近更新</span>
        </div>
      </aside>
    </section>

    <section class="note-grid" data-notes-grid aria-label="自动控制原理笔记列表">
      <div class="empty-state">正在加载自动控制原理笔记。</div>
    </section>
  </main>

  <script src="/study/assets/study.js"></script>
</body>
</html>
