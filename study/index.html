<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumy Study | 数学与自动控制笔记</title>
  <meta name="description" content="Tumy Study 的数学、自控与笔记编辑入口。">
  <link rel="stylesheet" href="/study/assets/study.css">
</head>
<body data-page="home">
  <canvas class="study-canvas" aria-hidden="true"></canvas>
  <main class="study-shell">
    <nav class="study-nav" aria-label="学习小站导航">
      <a class="study-brand" href="/study/">
        <span class="study-brand__mark">S</span>
        <span>Tumy Study</span>
      </a>
      <div class="study-nav__links">
        <a class="study-pill" href="/study/math/">数学</a>
        <a class="study-pill" href="/study/control/">自动控制原理</a>
        <a class="study-pill" href="/study/editor/">编辑区</a>
        <a class="study-pill" href="/">返回主站</a>
      </div>
    </nav>

    <section class="hero-grid hero-grid--studio" aria-labelledby="study-title">
      <div class="hero-panel hero-panel--studio">
        <div class="hero-copy">
          <p class="eyebrow">Study Lab</p>
          <h1 class="hero-title" id="study-title">Tumy Study</h1>
          <p class="hero-lead">数学 / 自控 / 编辑区</p>
        </div>

        <div class="desk-board" aria-hidden="true">
          <svg class="desk-board__trace" viewBox="0 0 620 320" fill="none">
            <defs>
              <linearGradient id="study-trace" x1="112" y1="210" x2="548" y2="90" gradientUnits="userSpaceOnUse">
                <stop stop-color="#58e6cf"/>
                <stop offset="0.52" stop-color="#ffb75e"/>
                <stop offset="1" stop-color="#d7f171"/>
              </linearGradient>
            </defs>
            <path class="desk-board__route" d="M112 210 C202 102 308 102 390 178 S506 238 548 90" stroke="url(#study-trace)"/>
            <path d="M132 236 H516"/>
            <path d="M132 236 V62"/>
          </svg>
          <div class="desk-node desk-node--math">
            <span>01</span>
            <strong>数学</strong>
            <small>z = f(x, y)</small>
          </div>
          <div class="desk-node desk-node--control">
            <span>02</span>
            <strong>自控</strong>
            <small>feedback</small>
          </div>
          <div class="desk-node desk-node--editor">
            <span>03</span>
            <strong>编辑区</strong>
            <small>publish</small>
          </div>
        </div>

        <div class="hero-actions">
          <a class="study-button" href="/study/math/">数学</a>
          <a class="study-button control" href="/study/control/">自控</a>
          <a class="study-button editor" href="/study/editor/">写笔记</a>
        </div>
      </div>

      <div class="course-stack" aria-label="学科入口">
        <a class="course-card course-card--math" href="/study/math/">
          <div class="course-card__content">
            <div class="course-card__meta">
              <span>Mathematics</span>
              <span>01</span>
            </div>
            <h2>数学</h2>
            <p>极限、曲面、矩阵、推导。</p>
          </div>
          <div class="course-card__visual">
            <svg class="math-glyph" viewBox="0 0 220 150" fill="none" aria-hidden="true">
              <path d="M18 112 C54 26 82 134 118 62 S168 18 204 100"/>
              <path d="M30 128 H190"/>
              <path d="M50 120 V30"/>
              <path d="M72 94 C94 66 124 66 146 94"/>
              <path d="M72 108 C96 86 130 86 158 108"/>
            </svg>
          </div>
        </a>

        <a class="course-card course-card--control" href="/study/control/">
          <div class="course-card__content">
            <div class="course-card__meta">
              <span>Control Theory</span>
              <span>02</span>
            </div>
            <h2>自动控制原理</h2>
            <p>传递函数、反馈环、稳定性。</p>
          </div>
          <div class="course-card__visual">
            <svg class="control-glyph" viewBox="0 0 220 150" fill="none" aria-hidden="true">
              <rect x="26" y="52" width="58" height="40" rx="10"/>
              <rect x="136" y="52" width="58" height="40" rx="10"/>
              <path d="M84 72 H136"/>
              <path d="M194 72 C214 72 214 126 112 126 C46 126 46 92 46 92"/>
              <circle cx="110" cy="72" r="6"/>
              <path d="M14 72 H26"/>
              <path d="M104 58 L116 72 L104 86"/>
            </svg>
          </div>
        </a>

        <a class="course-card course-card--editor" href="/study/editor/">
          <div class="course-card__content">
            <div class="course-card__meta">
              <span>Editor</span>
              <span>03</span>
            </div>
            <h2>编辑区</h2>
            <p>新建、载入、预览、发布。</p>
          </div>
          <div class="course-card__visual">
            <svg class="editor-glyph" viewBox="0 0 220 150" fill="none" aria-hidden="true">
              <path d="M58 24 H136 L168 56 V126 H58 Z"/>
              <path d="M136 24 V58 H168"/>
              <path d="M78 66 H134"/>
              <path d="M78 84 H146"/>
              <path d="M78 102 H120"/>
              <path d="M142 110 C164 100 172 86 176 66"/>
              <path d="M166 70 L178 58 L184 74"/>
              <path d="M34 112 H58"/>
              <path d="M44 38 H58"/>
            </svg>
          </div>
        </a>
      </div>
    </section>

    <section class="orbital-panel" aria-label="学习统计">
      <div class="orbital-panel__grid">
        <div class="metric">
          <strong data-stat="total">0</strong>
          <span>已收录笔记</span>
        </div>
        <div class="metric">
          <strong data-stat="math">0</strong>
          <span>数学笔记</span>
        </div>
        <div class="metric">
          <strong data-stat="control">0</strong>
          <span>自控笔记，最近更新：<span data-stat="latest">加载中</span></span>
        </div>
      </div>
    </section>
  </main>

  <script src="/study/assets/study.js"></script>
</body>
</html>
